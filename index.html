<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Earth</title>

    <!-- DAISYUI-TAILWIND -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- All Style -->
    <style>
        * {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>

<body>
    <main class="container mx-auto p-5">
        <h2 class="text-green-500 text-4xl text-center font-bold mb-5">Choose Your Trees</h2>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">

            <!-- Categories -->
            <div class="shadow-2xl card-body mt-10
                        md:col-span-4
                        lg:col-span-3 ">
                <h2 class="text-2xl font-bold mb-3">Categories</h2>
                <div class="space-y-3 sticky top-10 ">
                    <button id="all-tree-btn"
                        class="btn btn-success text-white w-full min-h-14 rounded-md hover:bg-green-400 active:bg-green-400 text-xl font-medium ">
                        All Trees
                    </button>
                    <!-- Container Category -->
                    <div id="container-category" class="space-y-3"></div>
                </div>
            </div>

            <!-- Trees -->
           
            <div id="tree-container" class="shadow-2xl rounded-xl relative
                                            md:col-span-8
                                            lg:col-span-6">
                
                <div id="cards-grid" class="grid grid-cols-1  sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- All card will dynamically appear here -->
                    <!-- ////////////// -->
                    <!-- <div class="card bg-base-100 shadow-sm">
                        <figure>
                            <img src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp" alt="Tree" />
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title">Card Title</h2>
                            <p class="line-clamp-2">A card component has a figure, a body part, and inside body there are title and actions parts</p>
                           <div class="badge badge-outline badge-success">Success</div>
                            <div class="flex card-actions justify-between">
                                <h2 class="text-2xl text-[#3caa62] font-bold">$500</h2>
                                <button class="btn btn-success text-white rounded-xl">Buy Now</button>
                            </div>
                        </div>
                    </div> -->
                </div>


                <!-- Loading spinner -->
                <div id="loading-spinner" class="h-[60vh] absolute inset-0 flex justify-center items-center hidden">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>

            <!-- Cart -->
            <div id="cart" class="bg-gray-400
                                  md:col-span-12
                                  lg:col-span-3">
                Cart
            </div>
        </div>
<!-- Modal -->
 <!-- Open the modal using ID.showModal() method -->
<button class="btn" onclick="tree-details.showModal()">open modal</button>
<dialog id="tree-details" class="modal">
  <div class="modal-box">
  <!-- Modal Header with Close Button -->
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

    </main>

    <script src="script.js"></script>
</body>

</html>
